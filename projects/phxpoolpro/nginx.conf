# ── PHX Pool Pro — Nginx site config ──────────────────────────────────────────
# Drop this file at: /etc/nginx/sites-available/phxpoolpro
# Then: sudo ln -s /etc/nginx/sites-available/phxpoolpro /etc/nginx/sites-enabled/phxpoolpro
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# IMPORTANT: Run certbot FIRST before enabling the HTTPS block.
# certbot --nginx -d phxpoolpro.com -d www.phxpoolpro.com

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name phxpoolpro.com www.phxpoolpro.com;

    # Let certbot handle this dir for domain verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main site ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name phxpoolpro.com www.phxpoolpro.com;

    # ── SSL — filled in by certbot ───────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/phxpoolpro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phxpoolpro.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY always;
    add_header X-Content-Type-Options     nosniff always;
    add_header Referrer-Policy            strict-origin-when-cross-origin always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Rate limiting — protect the form endpoint ────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/m;

    # ── Proxy to Docker container ─────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── API endpoint — rate limited ───────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=3 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    # ── Block common attack vectors ───────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
    location ~* \.(env|log|bak|sql|tar|gz)$ {
        deny all;
    }
}
